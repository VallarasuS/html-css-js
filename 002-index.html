<!-- HTML Version 5 -->
<!DOCTYPE html>

<html>

<head>
    <!-- Meta information about page -->
    <title>First Page</title>

    <link rel="stylesheet" href="./style.css">

    <style>
        input[type="button"] {
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            color: red;
        }
    </style>

</head>

<body>

    <h1> Python Django </h1>
    <h2> Learn python and django </h2>

    <!-- Self closing image tag -->
    <img src="assets/dj.png">

    <!-- horizontal rule -->
    <hr>

    <!-- line break -->
    <br>

    <!-- anchor tag - link to another page -->
    <a href="https://www.djangoproject.com/">Django</a>

    <br>

    <!-- input -->
    <input type="text" value="hello">
    <!-- In-line style -->
    <input type="button" value="Click Me" style="font-size: larger; text-decoration: underline;">
    <input type="date" value="Click Me">

</body>

</html>
